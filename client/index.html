<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Guardian Group - H&S Compliance Portal</title>
    <meta name="description" content="Guardian Group's secure Health & Safety compliance portal. Centralized document management, digital approval workflows, and comprehensive audit trails for enterprise compliance." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Code:wght@300..700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Oxanium:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
      #nav-loader {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #fff;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
      }
      #nav-loader.visible { display: flex; }
      #nav-loader-icon {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: linear-gradient(135deg, #0ea5e9, #818cf8);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #nav-loader-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: nav-spin 0.8s linear infinite;
      }
      #nav-loader-text { text-align: center; }
      #nav-loader-text p { margin: 0; font-family: system-ui, sans-serif; }
      #nav-loader-text p:first-child { font-size: 18px; font-weight: 600; color: #1e293b; }
      #nav-loader-text p:last-child { font-size: 14px; color: #64748b; margin-top: 4px; }
      @keyframes nav-spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      if (sessionStorage.getItem('freshLogin') === '1') {
        document.addEventListener('DOMContentLoaded', function() {
          var el = document.getElementById('nav-loader');
          if (el) el.classList.add('visible');
        });
      }
    </script>
  </head>
  <body>
    <div id="nav-loader">
      <div id="nav-loader-icon">
        <div id="nav-loader-spinner"></div>
      </div>
      <div id="nav-loader-text">
        <p>Signing you in</p>
        <p>Loading your portal, please wait&hellip;</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
